<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <header>
      <div class="title">
        <h1>Battleship</h1>
      </div>
    </header>
    <main>
      <div class="boards">
        <div class="player-container">
          <div class="player-name">

          </div>
          <div class="player board">
            <div class="ship two can-move"><div class="rotate active"></div></div>
            <div class="ship three first can-move"><div class="rotate active"></div></div>
            <div class="ship three second vertical-3 can-move"><div class="rotate active"></div></div>
            <div class="ship four vertical-4 can-move"><div class="rotate active"></div></div>
            <div class="ship five vertical-5 can-move"><div class="rotate active"></div></div>
          </div>
          <div class="setup-buttons active">
            <button class="randomize">Randomize</button>
          </div>
        </div>
        <div class="opponent-container">
          <div class="opponent-name">

          </div>
          <div class="opponent board">
          </div>
        </div>
      </div>
      <dialog id="win">
        <p><span class="name"></span> has won the game!!</p>
      </dialog>
    </main>
    <footer>
      <p>Rotate icon from <a href="https://www.svgrepo.com/collection/dazzle-line-icons/">SVG REPO</a></p>
    </footer>
  </body>
</html>
