<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Document</title><script defer="defer" src="main.js"></script></head><body><header><div class="title"><h1>Battleship</h1></div></header><main><div class="playerTurn hide"><p><span class="name"></span>'s Turn</p></div><div class="boards"><div class="board-container player-container"><div class="name-button"><div class="player-name"></div><div class="showButton hide"><button class="show">Show Ships</button></div></div><div class="player board"><div class="ship two can-move"><div class="rotate"></div></div><div class="ship three first can-move"><div class="rotate"></div></div><div class="ship three second can-move"><div class="rotate"></div></div><div class="ship four can-move"><div class="rotate"></div></div><div class="ship five can-move"><div class="rotate"></div></div></div><div class="setup-buttons"><button class="randomize">Randomize</button> <button class="ready">Ready</button></div><div class="ship-hit-display hide"><div class="ship-display two"><div class="safe"></div><div class="safe"></div></div><div class="ship-display three"><div class="safe"></div><div class="safe"></div><div class="safe"></div></div><div class="ship-display three"><div class="safe"></div><div class="safe"></div><div class="safe"></div></div><div class="ship-display four"><div class="safe"></div><div class="safe"></div><div class="safe"></div><div class="safe"></div></div><div class="ship-display five"><div class="safe"></div><div class="safe"></div><div class="safe"></div><div class="safe"></div><div class="safe"></div></div></div></div><div class="board-container opponent-container"><div class="name-button"><div class="opponent-name"></div><div class="showButton hide"><button class="show">Show Ships</button></div></div><div class="opponent board"><div class="hide ship two can-move"><div class="rotate"></div></div><div class="hide ship three first can-move"><div class="rotate"></div></div><div class="hide ship three second can-move"><div class="rotate"></div></div><div class="hide ship four can-move"><div class="rotate"></div></div><div class="hide ship five can-move"><div class="rotate"></div></div></div><div class="setup-buttons hide"><button class="randomize">Randomize</button> <button class="ready">Ready</button></div><div class="ship-hit-display hide"><div class="ship-display two"><div class="safe"></div><div class="safe"></div></div><div class="ship-display three"><div class="safe"></div><div class="safe"></div><div class="safe"></div></div><div class="ship-display three"><div class="safe"></div><div class="safe"></div><div class="safe"></div></div><div class="ship-display four"><div class="safe"></div><div class="safe"></div><div class="safe"></div><div class="safe"></div></div><div class="ship-display five"><div class="safe"></div><div class="safe"></div><div class="safe"></div><div class="safe"></div><div class="safe"></div></div></div></div><dialog id="start-options"><div class="title"><h1>Battleship</h1></div><div class="game-start-options"><form action="#"><fieldset class="game-type"><legend>Game Type:</legend><div class="field"><label for="computer">Player vs. Computer</label> <input type="radio" id="computer" name="opponent" value="computer" checked="checked"></div><div class="field"><label for="player">Player vs. Player</label> <input type="radio" id="player" name="opponent" value="player"></div></fieldset><fieldset class="names"><legend>Player Names:</legend><div class="field"><label for="player-1-name">Name:</label> <input placeholder="Player 1" id="player-1-name" name="player-1-name"></div><div class="field hide"><label for="player-2-name">Name:</label> <input placeholder="Player 2" id="player-2-name" name="player-2-name"></div></fieldset><fieldset class="attack-info"><legend>Options:</legend><div class="field"><label title="Displays all ships and the number of hits it has taken at the bottom of the board" for="show-hits">Fleet Damage Indicators:</label> <input type="checkbox" name="show-hits" id="show-hits"></div><div class="field"><label title="Reveals current player ships on button mousedown" for="activate-show-button">Ship reveal button:</label> <input type="checkbox" name="activate-show-button" id="activate-show-button"></div></fieldset><div class="button-container"><button>Continue</button></div></form></div></dialog><dialog id="win"><div class="conainer"><div class="announce-winner"><p><span class="name"></span> has won the game!!</p></div><div class="button-container"><button class="play-again" data-confirm="no">Play Again</button></div></div></dialog><dialog id="player-two-setup"><div class="container"><p><span class="name"></span>'s turn to setup</p><div class="button-container"><button class="setup">Setup</button></div></div></dialog></div><div class="restart-button-container"><button class="restart" data-confirm="yes">Restart</button></div></main><footer><p>Rotate icon from <a href="https://www.svgrepo.com/collection/dazzle-line-icons/">SVG REPO</a></p></footer></body></html>
